# Supabase CLI project configuration
# Run: supabase init && supabase link --project-ref YOUR_PROJECT_REF

[project]
id = "cybot"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
port = 54321
site_url = "http://localhost:8081"
additional_redirect_urls = [
  "cybot://auth/callback",
  "cybot://auth/reset-password",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = true
enable_confirmations = true
# OTP expiry in seconds (5 minutes)
otp_expiry = 300

[auth.sms.twilio]
enabled = true
account_sid = "env(TWILIO_ACCOUNT_SID)"
message_service_sid = "env(TWILIO_MESSAGE_SERVICE_SID)"
auth_token = "env(TWILIO_AUTH_TOKEN)"

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "https://YOUR_PROJECT_REF.supabase.co/auth/v1/callback"

# ─── Edge Functions ────────────────────────────────────────────
[functions.notify-threat]
verify_jwt = false    # Called internally by ml-inference (service role)

[functions.scheduled-scan]
verify_jwt = false
# Cron: every day at 02:00 UTC
schedule = "0 2 * * *"

[functions.ml-inference]
verify_jwt = false    # Authenticated via X-Internal-Service-Key header
