# nginx/nginx.conf
# Production reverse-proxy for the Cybot Django backend.
#
# Topology:  CloudFront CDN → ALB → nginx (ECS sidecar) → gunicorn
# SSL is terminated at CloudFront/ALB; nginx operates on HTTP internally.

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain application/json application/javascript text/css;
    gzip_min_length    1000;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api:10m    rate=60r/m;
    limit_req_zone  $binary_remote_addr  zone=auth:10m   rate=10r/m;
    limit_conn_zone $binary_remote_addr  zone=perip:10m;

    # ── Upstream: gunicorn ────────────────────────────────────────────────────
    upstream django {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options   "nosniff"         always;
        add_header X-Frame-Options          "DENY"            always;
        add_header X-XSS-Protection         "1; mode=block"   always;
        add_header Referrer-Policy          "strict-origin"   always;
        add_header Permissions-Policy       "geolocation=()"  always;

        # Size limits
        client_max_body_size 10M;
        limit_conn perip 20;

        # ── Health probe (no rate limit, no auth) ─────────────────────────────
        location = /health/ {
            proxy_pass         http://django;
            proxy_set_header   Host $host;
            access_log         off;
        }

        location = /health/ready/ {
            proxy_pass         http://django;
            proxy_set_header   Host $host;
            access_log         off;
        }

        # ── Auth endpoints (stricter rate limit) ──────────────────────────────
        location ~* ^/api/v1/auth/ {
            limit_req  zone=auth burst=5 nodelay;
            proxy_pass http://django;
            include    /etc/nginx/proxy_params;
        }

        # ── API endpoints ─────────────────────────────────────────────────────
        location /api/ {
            limit_req  zone=api burst=20 nodelay;
            proxy_pass http://django;
            include    /etc/nginx/proxy_params;
        }

        # ── Static files (WhiteNoise serves these; nginx catches anything else) ──
        location /static/ {
            proxy_pass         http://django;
            proxy_cache_valid  200 1d;
            add_header         Cache-Control "public, max-age=86400";
        }

        # ── Block common attack paths ─────────────────────────────────────────
        location ~* \.(php|asp|aspx|jsp)$ {
            return 444;
        }
        location ~* /(wp-admin|phpmyadmin|\.env|\.git) {
            return 444;
        }

        # ── Catch-all ─────────────────────────────────────────────────────────
        location / {
            proxy_pass http://django;
            include    /etc/nginx/proxy_params;
        }
    }
}
