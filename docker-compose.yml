version: "3.9"

# NOTE: No postgres service — database is managed by Supabase.
# This compose file runs nginx + backend API + Redis.

services:

  nginx:
    image: nginx:1.25-alpine
    container_name: cybot_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cybot_backend
    # Not exposed directly; nginx proxies to it
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_DEBUG=False
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  redis:
    image: redis:7-alpine
    container_name: cybot_redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --save 60 1
        --loglevel warning
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
